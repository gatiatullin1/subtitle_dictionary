<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Rezka Subtitle Dictionary</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
  <div id="update-banner" style="display:none">
    <span id="update-banner-text"></span>
    <button id="update-banner-reload">Перезагрузить</button>
  </div>
  <div class="tabs">
    <button class="tab-btn active" data-tab="subtitles">Субтитры</button>
    <button class="tab-btn" data-tab="dictionary">Словарь</button>
    <button class="tab-btn" data-tab="practice">Повторение</button>
    <button class="tab-btn" data-tab="stats">Статистика</button>
  </div>

  <div class="settings-bar">
    <label for="target-lang">🌐 Перевод на:</label>
    <select id="target-lang">
      <option value="ru">Русский</option>
      <option value="en">English</option>
      <option value="uk">Українська</option>
      <option value="kk">Қазақша</option>
      <option value="es">Español</option>
      <option value="de">Deutsch</option>
      <option value="fr">Français</option>
      <option value="it">Italiano</option>
      <option value="pt">Português</option>
      <option value="pl">Polski</option>
      <option value="tr">Türkçe</option>
      <option value="ar">العربية</option>
      <option value="zh-CN">中文</option>
      <option value="ja">日本語</option>
      <option value="ko">한국어</option>
    </select>
  </div>

  <div class="tab-content active" id="tab-subtitles">
    <div class="toolbar">
      <button id="clear-history-btn" class="ghost-btn">Очистить историю</button>
    </div>
    <div id="subtitle-list" class="subtitle-list">
      <p class="empty-state">Открой видео с субтитрами на rezka — строки появятся здесь.</p>
    </div>
  </div>

  <div class="tab-content" id="tab-dictionary">
    <div class="toolbar dict-toolbar">
      <input type="text" id="dict-search" placeholder="Поиск по словарю...">
      <button id="dict-export-btn" class="ghost-btn icon-btn" title="Скачать словарь как JSON">⬇</button>
      <label for="dict-import-input" id="dict-import-label" class="ghost-btn icon-btn" title="Загрузить словарь из JSON">⬆</label>
      <input type="file" id="dict-import-input" accept=".json" style="display:none">
    </div>
    <div id="dict-import-status" class="dict-import-status" style="display:none"></div>
    <div id="dictionary-list" class="dictionary-list">
      <p class="empty-state">Словарь пуст. Кликай по словам в субтитрах, чтобы добавить их.</p>
    </div>
  </div>

  <div class="tab-content" id="tab-practice">
    <div id="practice-area" class="practice-area">
      <p class="empty-state">В словаре пока нет слов для повторения.</p>
    </div>
  </div>

  <div class="tab-content" id="tab-stats">
    <div id="stats-area" class="stats-grid"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
